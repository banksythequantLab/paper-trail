name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  compile:
    name: byte-compile (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Byte-compile all sources
        run: python -m compileall -q agents hunts ingest ui
      - name: Lint (ruff, advisory)
        run: |
          python -m pip install --quiet ruff
          ruff check . --output-format=github || true