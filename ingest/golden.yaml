# Golden finding values -- the canonical numbers each hunt must reproduce.
# Derived from the real CMU Enron corpus in the warehouse. verify_golden.py
# re-derives these from the evidence tables and asserts they match EXACTLY, so a
# value regression (e.g. a z-score silently drifting from 4.43) fails the gate --
# not just a missing SQL string. The same evidence tables are written by the
# deterministic hunts and by the LLM agent, so this gate verifies both modes.

